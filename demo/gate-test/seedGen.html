<div class="aq-sg-wrap">

  <div class="aq-sg-header">
    <img src="aq://img/dao.logo" alt="AuthentiQ" class="aq-sg-logo-img" />
  </div>

  <div class="aq-sg-body">

    <h1 class="aq-seedgen-title">Új identitás</h1>
    <p class="aq-seedgen-intro">Ez az eszköz még nem tartalmaz identitást. Válassz védelmi módot.</p>

    <div class="aq-seedgen-choice" id="aq-seedgen-choice">
      <button type="button" class="aq-seedgen-btn aq-seedgen-btn-primary" id="aq-seedgen-btn-bio">Biometrikus védelem</button>
      <button type="button" class="aq-seedgen-btn" id="aq-seedgen-btn-pwd">Jelszó</button>
    </div>

    <div class="aq-seedgen-form aq-seedgen-hidden" id="aq-seedgen-form-pwd">
      <label class="aq-seedgen-label">Jelszó
        <input type="password" autocomplete="new-password" id="aq-seedgen-pwd1" />
      </label>
      <label class="aq-seedgen-label">Jelszó megerősítés
        <input type="password" autocomplete="new-password" id="aq-seedgen-pwd2" />
      </label>
      <div class="aq-seedgen-actions">
        <button type="button" class="aq-seedgen-btn" id="aq-seedgen-back-pwd">Vissza</button>
        <button type="button" class="aq-seedgen-btn aq-seedgen-btn-primary" id="aq-seedgen-submit-pwd">Létrehozás</button>
      </div>
    </div>

    <div class="aq-seedgen-status aq-seedgen-hidden" id="aq-seedgen-status"></div>
    <div class="aq-seedgen-error aq-seedgen-hidden" id="aq-seedgen-error"></div>

  </div>

</div>
